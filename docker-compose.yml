services:

  mysql:
    image: mysql:8.0

    container_name: mysql-library

    restart: always

    ports:
      - "3307:3306"

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: quanlysu5
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  springboot:
    build: .

    container_name: springboot-library

    restart: always

    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: